site_name: trap
site_description: Non-invasive CLI testing framework for AI workflows, agents, and pipelines.
repo_url: https://github.com/AntiNoise-ai/trapstreet-mvp
repo_name: AntiNoise-ai/trapstreet-mvp
edit_uri: edit/main/cli/docs/

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Guides:
      - Quick start: quickstart.md
      - Writing a solution: guides/writing-solution.md
      - Writing a task: guides/writing-task.md
      - Running & reporting: guides/running.md
  - Reference:
      - trap.yaml: reference/trap-yaml.md
      - traptask.yaml: reference/traptask-yaml.md
      - CLI: reference/cli.md
      - IO contract: reference/io-contract.md
      - Workspace (.trap/): reference/workspace.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
