tasks:
  # Local task name = trapstreet task_id so `tp submit` Just Works
  # without --as flag.
  echo:
    description: Echo solution — reads stdin JSON and writes it back to stdout
    cmd: uv run python echo.py
    traptask: ../task
    inputs:
      stdin: input.json

  run:
    cmd: uv run python echo.py
    traptask: ../task
    inputs:
      stdin: input.json
